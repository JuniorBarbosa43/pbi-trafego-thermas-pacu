name: Carga Historica -> Google Sheets

on:
  workflow_dispatch:
    inputs:
      somente:
        description: 'Modulo a executar (deixe vazio para todos)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - fb
          - fb-posts
          - ig
          - ig-posts

jobs:

  # ---------------------------------------------------------
  clima-historico:
    name: ClimaTempo Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica ClimaTempo
        env:
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_clima_sheets.py --historico

  # ---------------------------------------------------------
  meta-ads-historico:
    name: Meta Ads Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica Meta Ads
        env:
          META_TOKEN:            ${{ secrets.META_TOKEN }}
          META_AD_ACCOUNT_ID:    ${{ secrets.META_AD_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_meta_ads_sheets.py --historico --start-date 2024-12-01

  # ---------------------------------------------------------
  meta-organico-historico:
    name: Meta Organico Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica Meta Organico
        env:
          META_TOKEN:            ${{ secrets.META_TOKEN }}
          META_PAGE_ID:          ${{ secrets.META_PAGE_ID }}
          META_IG_ID:            ${{ secrets.META_IG_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: |
          SOMENTE="${{ github.event.inputs.somente }}"
          if [ -n "$SOMENTE" ]; then
            python scripts/atualizar_meta_organico_sheets.py --historico --somente "$SOMENTE"
          else
            python scripts/atualizar_meta_organico_sheets.py --historico
          fi

  # ---------------------------------------------------------
  google-ads-historico:
    name: Google Ads Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica Google Ads
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN:  ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:        ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:    ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:    ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID:      ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_CLIENT_ID:            ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:        ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:        ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_google_ads_sheets.py --historico

