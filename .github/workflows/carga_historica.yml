name: Carga Historica -> Google Sheets (desde 01/01/2025)

on:
  workflow_dispatch:       # Apenas execucao manual

jobs:

  # ---------------------------------------------------------
  clima-historico:
    name: ClimaTempo Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica ClimaTempo
        env:
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_clima_sheets.py --historico

  # ---------------------------------------------------------
  meta-ads-historico:
    name: Meta Ads Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica Meta Ads
        env:
          META_TOKEN:            ${{ secrets.META_TOKEN }}
          META_AD_ACCOUNT_ID:    ${{ secrets.META_AD_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_meta_ads_sheets.py --historico

  # ---------------------------------------------------------
  meta-organico-historico:
    name: Meta Organico Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica Meta Organico
        env:
          META_TOKEN:            ${{ secrets.META_TOKEN }}
          META_PAGE_ID:          ${{ secrets.META_PAGE_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_meta_organico_sheets.py --historico

  # ---------------------------------------------------------
  google-ads-historico:
    name: Google Ads Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica Google Ads
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN:  ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:        ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:    ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:    ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID:      ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_CLIENT_ID:            ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:        ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:        ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_google_ads_sheets.py --historico

  # ---------------------------------------------------------
  whatsapp-historico:
    name: WhatsApp Historico
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Carga historica WhatsApp
        env:
          GHL_FIREBASE_REFRESH_TOKEN: ${{ secrets.GHL_FIREBASE_REFRESH_TOKEN }}
          GHL_FIREBASE_API_KEY:       ${{ secrets.GHL_FIREBASE_API_KEY }}
          GHL_LOCATION:               ${{ secrets.GHL_LOCATION }}
          GHL_WABA_ID:                ${{ secrets.GHL_WABA_ID }}
          GOOGLE_CLIENT_ID:           ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:       ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:       ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:             ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/atualizar_whatsapp_sheets.py --historico
