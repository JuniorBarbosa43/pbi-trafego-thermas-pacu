name: Teste Meta Ads Historico

on:
  workflow_dispatch:

jobs:
  upload-json:
    name: Upload JSON local -> Sheets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upload meta_ads_campanhas.json para Sheets
        env:
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SPREADSHEET_ID:        ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/upload_meta_ads_json.py --json-file data/meta_ads_campanhas.json
